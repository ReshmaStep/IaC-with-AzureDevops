# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest



steps:

# Plan Stage #

- task: TerraformInstaller@1
  displayName: "Install Terraform"
  inputs:
    terraformVersion: 'latest'

# Terraform Init (Dev)
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(Build.SourcesDirectory)/env/dev'
    
    backendServiceArm: 'devopsconnection'
    backendAzureRmOverrideSubscriptionID: '92dda2f1-5e99-458f-b32b-2a8612c8a48f'
    backendAzureRmResourceGroupName: 'NCPL'
    backendAzureRmStorageAccountName: 'dev1storageacount'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'dev.terraform.tfstate'

# Terraform validate
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'validate'

#Terrafrom Plan
- task: TerraformTask@5
  displayName: 'Terrafrom plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'devopsconnection'
    environmentAzureRmOverrideSubscriptionID: '92dda2f1-5e99-458f-b32b-2a8612c8a48f'
    workingDirectory: '$(Build.SourcesDirectory)/env/dev'
    commandOptions: '-var-file=dev.tfvars'

#Terrafrom Apply
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    environmentServiceNameAzureRM: 'devopsconnection'
    environmentAzureRmOverrideSubscriptionID: '92dda2f1-5e99-458f-b32b-2a8612c8a48f'
    workingDirectory: '$(Build.SourcesDirectory)/env/dev'
    commandOptions: '-auto-approve -var-file=dev.tfvars'
