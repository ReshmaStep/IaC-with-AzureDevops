# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
   terraformWorkingDir: '$(Build.SourcesDirectory)/env/dev'

steps:

# Plan Stage #

- task: TerraformInstaller@1
  displayName: "Install Terraform"
  inputs:
    terraformVersion: 'latest'

# Terraform Init (Dev)
- task: TerraformTask@5
  displayName: "Terraform Init-Dev"
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'devopsconnection'
    backendAzureRmOverrideSubscriptionID: '92dda2f1-5e99-458f-b32b-2a8612c8a48f'
    backendAzureRmResourceGroupName: 'NCPL'
    backendAzureRmStorageAccountName: 'dev2storageacount'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'dev.terraform.tfstate'

# Terraform Validate
         
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'validate'
    
# Terraform Plan (Dev)
- task: TerraformTask@5
  displayName: "Terraform Plan -Dev"
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'devopsconnection'
    environmentAzureRmOverrideSubscriptionID: '92dda2f1-5e99-458f-b32b-2a8612c8a48f'
    workingDirectory: '$(terraformWorkingDir)'